<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🐝 Flowbee — Fleet</title>
<style>
  :root{
    --bg:#0a0b0f; --panel:#13151c; --panel2:#171a22; --line:#242936; --inset:#0e1017;
    --txt:#e7e9ee; --dim:#8b92a6; --faint:#5b6273;
    --bee:#facc15; --bee-dim:#a8870f;
    --claude:#e0925f; --codex:#10b981; --test:#2dd4bf;
    --build:#3b82f6; --review:#a855f7; --merge:#22c55e; --idle:#3a4150;
    --ok:#34d399; --warn:#f59e0b; --bad:#ef4444;
    --mono:'SF Mono','JetBrains Mono',ui-monospace,Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 85% -10%,rgba(250,204,21,.06),transparent 60%),
    radial-gradient(900px 500px at -10% 110%,rgba(16,185,129,.05),transparent 60%),var(--bg);
    color:var(--txt);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 24px 60px}
  header{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{font-size:30px;filter:drop-shadow(0 0 12px rgba(250,204,21,.5));animation:bob 4s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-3px) rotate(-4deg)}}
  .brand h1{font-size:20px;margin:0;font-weight:700}
  .brand .sub{color:var(--dim);font-size:12px;font-family:var(--mono);margin-top:2px}
  .stats{display:flex;gap:10px;flex-wrap:wrap}
  .pill{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:9px 14px;min-width:90px}
  .pill .n{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .pill .l{font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint);margin-top:5px}
  .pill.bee .n{color:var(--bee)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:16px}
  .box{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:16px;padding:16px 17px 15px;overflow:hidden;animation:rise .5s cubic-bezier(.2,.8,.2,1) both;
    transition:transform .35s,border-color .35s,box-shadow .35s}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98)}}
  .box:hover{transform:translateY(-3px);border-color:#333b50;box-shadow:0 16px 44px -20px rgba(0,0,0,.85)}
  .head{display:flex;align-items:center;gap:11px}
  .dot{position:relative;width:11px;height:11px;border-radius:50%;background:var(--ok);flex:0 0 auto}
  .dot::after{content:"";position:absolute;inset:0;border-radius:50%;background:inherit}
  .dot.beat::after{animation:ping 1.1s cubic-bezier(0,0,.2,1)}
  @keyframes ping{0%{transform:scale(1);opacity:.7}100%{transform:scale(3.6);opacity:0}}
  .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}
  .name{font-size:18px;font-weight:700;flex:1;min-width:0}
  .seen{text-align:right;font-family:var(--mono);font-size:11px;color:var(--ok)}
  .seen.warn{color:var(--warn)} .seen.bad{color:var(--bad)}
  .seen .lbl{display:block;color:var(--faint);font-size:9px;letter-spacing:.6px;text-transform:uppercase}
  .hw{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin:10px 0 13px}
  .hw b{color:var(--txt)}

  /* per-model capacity rows */
  .cap{display:flex;flex-direction:column;gap:9px;margin-bottom:13px}
  .crow{display:grid;grid-template-columns:58px auto 1fr;gap:9px;align-items:center}
  .crow .m{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--mc)}
  .pips{display:flex;gap:3px}
  .pips i{width:9px;height:9px;border-radius:2px;background:#222838;transition:background .3s,box-shadow .3s}
  .pips i.on{background:var(--mc);box-shadow:0 0 7px color-mix(in srgb,var(--mc) 70%,transparent)}
  .acct{min-width:0}
  .acct .nm{font-family:var(--mono);font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px;margin-bottom:3px;white-space:nowrap}
  .acct .roll{color:var(--warn)}
  .gauge{position:relative;height:5px;border-radius:3px;background:#1a1f2c;overflow:visible}
  .gauge .fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:var(--ok);transition:width .5s,background .5s}
  .gauge .fill.warn{background:var(--warn)} .gauge .fill.bad{background:var(--bad)}
  .gauge .ceil{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--bad);opacity:.7;border-radius:2px}
  .pct{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:3px}

  .capchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
  .chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--dim);background:var(--inset)}
  .chip.test{color:var(--test);border-color:color-mix(in srgb,var(--test) 35%,transparent)}

  .lanes{display:flex;flex-direction:column;gap:7px}
  .lane{background:var(--inset);border:1px solid var(--line);border-radius:10px;padding:8px 11px;display:flex;flex-direction:column;gap:6px}
  .lane.run{border-color:color-mix(in srgb,var(--accent) 32%,var(--line))}
  .lrow{display:flex;align-items:center;gap:7px;min-width:0}
  .mtag{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;background:color-mix(in srgb,var(--mc) 15%,transparent);color:var(--mc);flex:0 0 auto}
  .stage{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--accent);flex:0 0 auto}
  .jn{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .jt{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .bar{height:3px;border-radius:3px;background:#1c2130;overflow:hidden;position:relative}
  .bar>i{position:absolute;inset:0;width:38%;border-radius:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:slide 1.5s linear infinite}
  @keyframes slide{from{transform:translateX(-120%)}to{transform:translateX(330%)}}
  .lane.free{opacity:.45} .lane.free .lrow{color:var(--faint);font-family:var(--mono);font-size:11px;gap:8px}
  .z{width:7px;height:7px;border-radius:50%;background:var(--idle);animation:breathe 2.4s ease-in-out infinite}
  @keyframes breathe{50%{opacity:.3;transform:scale(.6)}}
  footer{margin-top:26px;display:flex;align-items:center;gap:10px;color:var(--faint);font-family:var(--mono);font-size:11.5px;border-top:1px solid var(--line);padding-top:14px}
  .live{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:breathe 1.6s infinite}
  #feed{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;transition:opacity .3s}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="logo">🐝</div>
      <div><h1>Flowbee · Fleet</h1><div class="sub" id="clock">control plane · 3 boxes</div><div class="sub" style="margin-top:5px"><a href="flowbee-dashboard.html" style="color:#facc15;text-decoration:none;font-weight:600">● Fleet</a> &nbsp; <a href="flowbee-board.html" style="color:#8b92a6;text-decoration:none">Board ↗</a></div></div></div>
    <div class="stats">
      <div class="pill"><div class="n" id="s-online">3</div><div class="l">Boxes</div></div>
      <div class="pill"><div class="n" id="s-busy">0</div><div class="l">Slots busy</div></div>
      <div class="pill bee"><div class="n" id="s-flight">0</div><div class="l">In flight</div></div>
    </div>
  </header>
  <div class="grid" id="grid"></div>
  <footer><span class="live"></span><span id="feed">streaming lease events…</span></footer>
</div>

<script>
const STAGE={building:'var(--build)',reviewing:'var(--review)',merging:'var(--merge)',testing:'var(--test)'};
const MC={Claude:'var(--claude)',Codex:'var(--codex)',Test:'var(--test)'};
const TITLES=['OAuth session middleware','rate-limit reconciler','SSE event broker','epoch refs','fenced lease claim',
  'webhook HMAC verify','blast-radius gate','cost ceiling rollup','spec content-hash','login flow','checkout flow'];
const rint=(a,b)=>a+Math.floor(Math.random()*(b-a+1)),rnd=a=>a[Math.floor(Math.random()*a.length)];
let JN=1287;

// global accounts — usage tracked per ACCOUNT (shared across boxes on the same login)
let accounts={
  'claude-workers':{usage:58,ceiling:90,limited:false},
  'claude-plan':   {usage:22,ceiling:100,limited:false},
  'codex-main':    {usage:40,ceiling:90,limited:false},
};
function active(list){ for(const a of list){const ac=accounts[a]; if(ac && !ac.limited && ac.usage<ac.ceiling) return a;} return list[list.length-1]; }

let boxes=[
  {name:'Feller', arch:'x86_64',os:'ubuntu-24.04',
    models:{Claude:{slots:3,accts:['claude-workers','claude-plan']},Codex:{slots:3,accts:['codex-main']}}},
  {name:'Buncher',arch:'x86_64',os:'ubuntu-24.04',
    models:{Claude:{slots:3,accts:['claude-workers','claude-plan']},Codex:{slots:3,accts:['codex-main']}}},
  {name:'M1',arch:'arm64',os:'macos',test:true,caps:['role:test','arch:arm64','tool:playwright'],slotsN:1},
].map(b=>{const total=b.test?b.slotsN:Object.values(b.models).reduce((a,m)=>a+m.slots,0);
  return {...b,total,lanes:Array(total).fill(null),lastPoll:Date.now()-rint(0,3000),pollEvery:rint(2400,4200),nextPoll:Date.now()+rint(300,2000),_el:null}});

const grid=document.getElementById('grid');
function newJob(b){
  if(b.test) return {model:'Test',acct:'—',stage:'testing',n:JN++,title:rnd(TITLES)+' (arm64)',until:Date.now()+rint(9000,18000)};
  const model=rnd(Object.keys(b.models)); const acct=active(b.models[model].accts);
  const stage=model==='Codex'?rnd(['building','building','merging']):rnd(['reviewing','reviewing','building']);
  accounts[acct].usage=Math.min(100,accounts[acct].usage+rint(2,5));
  return {model,acct,stage,n:JN++,title:rnd(TITLES),until:Date.now()+rint(6000,15000)};
}

function gauge(acctName){const a=accounts[acctName];const cls=a.usage>=a.ceiling?'bad':a.usage>=a.ceiling-18?'warn':'';
  return `<div class="gauge"><div class="fill ${cls}" style="width:${a.usage}%"></div><div class="ceil" style="left:${a.ceiling}%"></div></div>
    <div class="pct">${a.usage}% used · ceiling ${a.ceiling}%${a.limited?' · LIMITED':''}</div>`;}

function build(b){
  const el=document.createElement('div');el.className='box';b._el=el;
  el.innerHTML=`<div class="head"><span class="dot" data-dot></span><span class="name">${b.name}</span>
      <span class="seen" data-seen><span class="lbl">last poll</span><span data-ago>—</span></span></div>
    <div class="hw"><b>${b.arch}</b> · ${b.os}</div>
    <div data-cap></div><div class="lanes" data-lanes></div>`;
  grid.appendChild(el); renderCap(b); renderLanes(b);
}
function renderCap(b){
  const wrap=b._el.querySelector('[data-cap]');
  if(b.test){ wrap.className='capchips'; wrap.innerHTML=`<span class="chip test">E2E · playwright</span>`+b.caps.map(c=>`<span class="chip">${c}</span>`).join(''); return; }
  wrap.className='cap';
  wrap.innerHTML=Object.entries(b.models).map(([m,cfg])=>{
    const busy=b.lanes.filter(j=>j&&j.model===m).length;
    const pips=Array.from({length:cfg.slots},(_,i)=>`<i class="${i<busy?'on':''}"></i>`).join('');
    const act=active(cfg.accts); const rolled=act!==cfg.accts[0];
    return `<div class="crow" style="--mc:${MC[m]}">
      <span class="m">${m}</span>
      <span class="pips">${pips}</span>
      <span class="acct"><span class="nm">▸ ${act}${rolled?` <span class="roll">↪ rolled over</span>`:''}</span>${gauge(act)}</span>
    </div>`;}).join('');
}
function renderLanes(b){
  const wrap=b._el.querySelector('[data-lanes]');wrap.innerHTML='';
  b.lanes.forEach(j=>{const lane=document.createElement('div');
    if(!j){lane.className='lane free';lane.innerHTML=`<div class="lrow"><span class="z"></span>idle slot</div>`;}
    else{lane.className='lane run';lane.style.setProperty('--accent',STAGE[j.stage]);lane.style.setProperty('--mc',MC[j.model]);
      lane.innerHTML=`<div class="lrow"><span class="mtag">${j.model}${j.acct!=='—'?' · '+j.acct.replace('claude-','').replace('codex-',''):''}</span>
        <span class="stage">${j.stage}</span><span class="jn">#${j.n}</span><span class="jt">${j.title}</span></div><div class="bar"><i></i></div>`;}
    wrap.appendChild(lane);});
}
function feed(m){const f=document.getElementById('feed');f.style.opacity=0;setTimeout(()=>{f.textContent=m;f.style.opacity=1},150)}

function poll(b){b.lastPoll=Date.now();b.nextPoll=Date.now()+b.pollEvery;
  const d=b._el.querySelector('[data-dot]');d.classList.remove('beat');void d.offsetWidth;d.classList.add('beat');
  let ch=false;
  b.lanes.forEach((j,i)=>{ if(!j&&Math.random()<0.5){const nj=newJob(b);b.lanes[i]=nj;ch=true;
    feed(`⟵ ${b.name} leased #${nj.n} · ${nj.model}${nj.acct!=='—'?'/'+nj.acct:''} · ${nj.stage}`);} });
  if(ch){renderLanes(b);renderCap(b);}
}
function tick(){const now=Date.now();let busy=0,flight=0;
  // every box reports usage ~ periodically; emulate window resets + drift
  Object.values(accounts).forEach(a=>{ if(Math.random()<0.04) a.usage=Math.max(8,a.usage-rint(15,30)); });
  boxes.forEach(b=>{
    if(now>=b.nextPoll) poll(b);
    let ch=false;
    b.lanes.forEach((j,i)=>{ if(j&&now>=j.until){feed(`✓ ${b.name} finished #${j.n} · ${j.model}`);b.lanes[i]=null;ch=true;} });
    if(ch){renderLanes(b);renderCap(b);}
    const active=b.lanes.filter(Boolean).length;busy+=active;flight+=active;
    const age=Math.round((now-b.lastPoll)/1000),seen=b._el.querySelector('[data-seen]'),dot=b._el.querySelector('[data-dot]'),ago=b._el.querySelector('[data-ago]');
    ago.textContent=age<1?'just now':age+'s ago';seen.className='seen '+(age>40?'bad':age>15?'warn':'');
    dot.classList.toggle('warn',age>15&&age<=40);dot.classList.toggle('bad',age>40);
  });
  boxes.forEach(renderCap); // refresh gauges/rollover live
  setN('s-busy',busy+' / '+boxes.reduce((a,b)=>a+b.total,0));setN('s-flight',flight);
  document.getElementById('clock').textContent=`control plane · 3 boxes · ${new Date().toLocaleTimeString()}`;
}
const cur={};function setN(id,v){const e=document.getElementById(id);if(cur[id]===v)return;cur[id]=v;e.textContent=v;
  e.animate([{transform:'scale(1.16)',color:'var(--bee)'},{transform:'scale(1)'}],{duration:320,easing:'ease-out'})}

boxes.forEach((b,i)=>setTimeout(()=>build(b),i*110));
setTimeout(()=>{tick();setInterval(tick,1000)},boxes.length*110+200);
</script>
</body>
</html>
