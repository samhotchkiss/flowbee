name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # self-hosted runner on our own infra (imac-flowbee-1), not GitHub-hosted —
    # the whole loop (build/review/merge AND CI) runs on Sam's boxes. GitHub still
    # orchestrates the check + reports status, which is what Flowbee reconciles to
    # gate the merge.
    runs-on: [self-hosted, flowbee-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: archcheck (deterministic-core boundary)
        run: go run ./tools/archcheck
      - name: unit tests
        run: go test ./... -short -race
