name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # GitHub-hosted runners: free for public repos, parallel (no single-runner
    # queue), and faster than one self-hosted box. Flowbee gates the merge on this
    # check going green either way — only the execution location differs. (A
    # self-hosted runner makes sense for a PRIVATE repo to avoid Actions minutes.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # laddercheck compares the candidate to `git merge-base origin/main
          # HEAD`; shallow history would make that forward-only gate ambiguous.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: archcheck (deterministic-core boundary)
        run: go run ./tools/archcheck
      - name: laddercheck (migration-number ladder)
        run: go run ./tools/laddercheck
      - name: unit tests
        run: go test ./... -short -race
