services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flowbee
      POSTGRES_PASSWORD: flowbee
      POSTGRES_DB: flowbee
    ports:
      # host 5433 to avoid colliding with a native Postgres on 5432
      - "5433:5432"
    # dev-only durability-off flags for a fast local test loop (BUILD.md §6.6)
    command:
      ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off", "-c", "full_page_writes=off"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowbee -d flowbee"]
      interval: 2s
      timeout: 3s
      retries: 20
